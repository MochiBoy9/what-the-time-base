<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ayo what the time</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold mb-2">ay what's the time</h1>
            <p class="text-slate-400">very cool application for when someone asks what the time is</p>
        </header>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    <script>
        const CITIES = [
            { name: "New York", lat: 40.71, lon: -74.01, zone: "America/New_York" },
            { name: "London", lat: 51.50, lon: -0.12, zone: "Europe/London" },
            { name: "Tokyo", lat: 35.68, lon: 139.76, zone: "Asia/Tokyo" },
            { name: "Sydney", lat: -33.86, lon: 151.20, zone: "Australia/Sydney" },
            { name: "California", lat: 36.77, lon: 119.41, zone: "America/California" }
        ];
        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&temperature_unit=fahrenheit`);
                const data = await response.json();
                return data.current.temperature_2m;
            } catch (e) { return '??'; }
        }
        async function buildDashboard() {
            const container = document.getElementById('dashboard');
            container.innerHTML = ''; 
            for (const city of CITIES) {
                const temp = await fetchWeather(city.lat, city.lon);
                const card = document.createElement('div');
                card.className = "bg-slate-800 rounded-xl p-6 shadow-lg border border-slate-700";
                const cityId = city.name.replace(/\s+/g, '-').toLowerCase();     
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-2xl font-semibold">${city.name}</h2>
                            <p class="text-xs text-slate-500 uppercase tracking-widest">${city.zone}</p>
                        </div>
                        <div class="text-right">
                            <p id="time-${cityId}" class="text-3xl font-mono text-blue-400 font-bold">--:--:--</p>
                        </div>
                    </div>
                    <div class="mt-6 flex items-center justify-between">
                        <span class="text-4xl font-bold">${Math.round(temp)}°C</span>
                        <span class="text-slate-400 text-sm">Local Temp</span>
                    </div>
                `;
                container.appendChild(card);
            }
            updateClocks();
        }
        function updateClocks() {
            CITIES.forEach(city => {
                const cityId = city.name.replace(/\s+/g, '-').toLowerCase();
                const timeElement = document.getElementById(`time-${cityId}`);
                if (timeElement) {
                    timeElement.innerText = new Intl.DateTimeFormat('en-US', {
                        timeZone: city.zone,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: true
                    }).format(new Date());
                }
            });
        }
        buildDashboard();
        setInterval(updateClocks, 1000);
        setInterval(buildDashboard, 1800000);
    </script>
</body>
</html>

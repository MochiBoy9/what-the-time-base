    const msg_list = ["ay what's the time", "¿qué hora es?", "quelle heure est-il?", "che ora è?", "what time is it?", "anong oras na?", "saat kaç?"];
    function updateTheHead() {
        let el = document.querySelector('h1');
        el.innerText = msg_list[Math.floor(Math.random() * msg_list.length)];
    }
    //ACTUAL WEATHER??? NO WAY
    const interpret_weather = (c) => {
        if (c == 0) return "Clear Sky";
        if (c >= 1 && c <= 3) return "Partly Cloudy";
        if (c >= 45 && c <= 48) return "Foggy";
        if (c >= 51 && c <= 55) return "Drizzle";
        if (c >= 61 && c <= 65) return "Rainy";
        if (c >= 71 && c <= 77) return "Snowy";
        if (c >= 80 && c <= 82) return "Rain Showers";
        if (c >= 95) return "Stormy";
        return "Unknown";
    }
    async function whatTheWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&temperature_unit=fahrenheit`);
            const raw = await res.json();
            return raw.current || null;
        } catch (err) { 
            console.log("weather broke lol", err);
            return null; 
        }
    }
    document.getElementById('citySearch').oninput = function(e) {
        let val = e.target.value.toLowerCase();
        let all_cards = document.querySelectorAll('.city-card');
        let found = 0;
        all_cards.forEach(c => {
            let name = c.getAttribute('data-name');
            if (name.includes(val)) {
                c.style.display = "block";
                found++;
            } else {
                c.style.display = "none";
            }
        });
        let no_res = document.getElementById('noResults');
        if (found === 0) no_res.classList.remove('hidden');
        else no_res.classList.add('hidden');
        //function name is self-explanatory
    };
    function makeEVERYTHING() {
        const board = document.getElementById('dashboard');
        board.innerHTML = ''; 
        CITIES.forEach(item => {
            const card_div = document.createElement('div');
            const safe_id = item.name.replace(/\s+/g, '-').toLowerCase();
            card_div.className = "city-card bg-slate-800/50 backdrop-blur-md rounded-xl p-6 shadow-lg border border-slate-700 transition-all duration-300 transform hover:scale-105 hover:border-blue-500 cursor-default";
            card_div.setAttribute('data-name', item.name.toLowerCase());
            card_div.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-2xl font-semibold">${item.name}</h2>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">${item.zone}</p>
                        <p id="cond-${safe_id}" class="text-blue-300 text-sm italic mt-1">Loading weather...</p>
                    </div>
                    <div class="text-right">
                        <p id="time-${safe_id}" class="text-3xl font-mono text-blue-400 font-bold">--:--:--</p>
                    </div>
                </div>
                <div class="mt-6 flex items-center justify-between">
                    <div class="flex flex-col">
                        <span id="temp-${safe_id}" class="text-4xl font-bold">...</span>
                        <span class="text-slate-400 text-xs uppercase">Temp</span>
                    </div>
                    <div class="flex flex-col text-right border-l border-slate-700 pl-4">
                        <span id="hum-${safe_id}" class="text-2xl font-bold text-blue-300">...</span>
                        <span class="text-slate-400 text-xs uppercase">Humidity</span>
                    </div>
                </div>
            `;
            board.appendChild(card_div);
            get_and_set_weather(item, safe_id);
        });
        updateClocks();
    }
    const get_and_set_weather = async (city_obj, id) => {
        let weather = await whatTheWeather(city_obj.lat, city_obj.lon);
        let t_el = document.getElementById(`temp-${id}`);
        let h_el = document.getElementById(`hum-${id}`);
        let c_el = document.getElementById(`cond-${id}`);
        if (weather) {
            if (t_el) t_el.innerText = Math.round(weather.temperature_2m) + "°F";
            if (h_el) h_el.innerText = weather.relative_humidity_2m + "%";
            if (c_el) c_el.innerText = interpret_weather(weather.weather_code);
        } else {
            if (c_el) c_el.innerText = "N/A";
        }
    }
    const updateClocks = () => {
        CITIES.forEach(c => {
            const sid = c.name.replace(/\s+/g, '-').toLowerCase();
            const target = document.getElementById('time-' + sid);
            if (target) {
                try {
                    target.innerText = new Intl.DateTimeFormat('en-US', {
                        timeZone: c.zone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                    }).format(new Date());
                } catch (err) { target.innerText = "??:??"; }
            }
        });
    }
    //the main heartbeats of the website
    updateTheHead(); 
    makeEVERYTHING();
    setInterval(updateClocks, 1000);
    setInterval(() => {
        console.log("getting the newest weather rn");
        makeEVERYTHING();
    }, 1800000);

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ayo what the time</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
    * {
        scrollbar-width: none;
    }
    *::-webkit-scrollbar {
        display: none;
    }
    body {
        -ms-overflow-style: none;  
        scrollbar-width: none;    
    }
</style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-400 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold mb-2">ay what's the time</h1>
            <p class="text-slate-400">very cool application for when someone asks what the time is</p>
            <p class="text-slate-400">proudly made for Macondo and with open-meteo</p>
        </header>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    <script>
        //phrases and cities are easily modifiable (but im too lazy do add more)
        const CITIES = [
            { name: "Iran", lat: 35.68, lon: 51.38, zone: "Asia/Tehran" },
            { name: "Palestine", lat: 31.94, lon: 35.20, zone: "Asia/Gaza" },
            { name: "Philippines", lat: 14.59, lon: 120.98, zone: "Asia/Manila" },
            { name: "Singapore", lat: 1.35, lon: 103.81, zone: "Asia/Singapore" },
            { name: "New York", lat: 40.71, lon: -74.01, zone: "America/New_York" },
            { name: "London", lat: 51.50, lon: -0.12, zone: "Europe/London" },
            { name: "Tokyo", lat: 35.68, lon: 139.76, zone: "Asia/Tokyo" },
            { name: "California", lat: 34.05, lon: -118.24, zone: "America/Los_Angeles" },
            { name: "Moscow", lat: 55.75, lon: 37.61, zone: "Europe/Moscow" },
            { name: "Dubai", lat: 25.20, lon: 55.27, zone: "Asia/Dubai" },
            { name: "Hong Kong", lat: 22.31, lon: 114.16, zone: "Asia/Hong_Kong" },
            { name: "Toronto", lat: 43.65, lon: -79.38, zone: "America/Toronto" },
            { name: "Antarctica", lat: -77.84, lon: 166.66, zone: "Antarctica/McMurdo" }
        ];
        const PHRASES = [
            "ay what's the time",
            "¿qué hora es?",
            "quelle heure est-il?",
            "che ora è?",
            "what time is it?",
            "wat is de tijd?",
            "hoe laat is het?",
            "anong oras na?",
            "jam berapa sekarang?",
            "saat kaç?"
        ];
        function updateHeader() {
            const headerElement = document.querySelector('h1');
            const randomPhrase = PHRASES[Math.floor(Math.random() * PHRASES.length)];
            headerElement.innerText = randomPhrase;
        }
        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m&temperature_unit=fahrenheit`);
                const data = await response.json();
                return data.current;
            } catch (e) { return '??'; }
        }
    //builds the cards
        async function buildDashboard() {
            const container = document.getElementById('dashboard');
            container.innerHTML = ''; 
            for (const city of CITIES) {
                const weatherData = await fetchWeather(city.lat, city.lon);
                const card = document.createElement('div');
                card.className = "bg-slate-800/50 backdrop-blur-md rounded-xl p-6 shadow-lg border border-slate-700 transition-all duration-300 transform hover:scale-105 hover:border-blue-500 hover:shadow-2xl cursor-default";
                const cityId = city.name.replace(/\s+/g, '-').toLowerCase();
                const temp = weatherData !== '??' ? Math.round(weatherData.temperature_2m) : '--';
                const humidity = weatherData !== '??' ? weatherData.relative_humidity_2m : '--';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-2xl font-semibold">${city.name}</h2>
                            <p class="text-xs text-slate-500 uppercase tracking-widest">${city.zone}</p>
                        </div>
                        <div class="text-right">
                            <p id="time-${cityId}" class="text-3xl font-mono text-blue-400 font-bold">--:--:--</p>
                        </div>
                    </div>
                    <div class="mt-6 flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-4xl font-bold">${temp}°F</span>
                            <span class="text-slate-400 text-xs uppercase">Temp</span>
                        </div>
                        <div class="flex flex-col text-right border-l border-slate-700 pl-4">
                            <span class="text-2xl font-bold text-blue-300">${humidity}%</span>
                            <span class="text-slate-400 text-xs uppercase">Humidity</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
            updateClocks();
        }
    // basically runs the clocks
        function updateClocks() {
            CITIES.forEach(city => {
                const cityId = city.name.replace(/\s+/g, '-').toLowerCase();
                const timeElement = document.getElementById(`time-${cityId}`);
                if (timeElement) {
                    try {
                        timeElement.innerText = new Intl.DateTimeFormat('en-US', {
                            timeZone: city.zone,
                            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                        }).format(new Date());
                    } catch (e) {
                        timeElement.innerText = "Error";
                    }
                }
            });
        }
        //tick updater
        updateHeader(); 
        buildDashboard();
        setInterval(updateClocks, 1000);
        setInterval(buildDashboard, 1800000);
    </script>
    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-50">
        <a href="https://github.com/MochiBoy9" target="_blank" class="bg-slate-800 p-3 rounded-full border border-slate-700 hover:border-blue-500 hover:scale-110 transition-all shadow-lg group" title="my github">

        </a>
    </div>
</body>
</html>

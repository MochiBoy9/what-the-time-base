<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ayo what the time</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-400 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold mb-2">ay what's the time</h1>
            <p class="text-slate-400">weather and time platform</p>
            <p class="text-slate-400">made with open-meteo and created for Hack Club</p>
            <div class="mt-6 max-w-md mx-auto">
                <input type="text" id="citySearch" placeholder="what are you tryna look for?" class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none transition-all text-white">
            </div>
        </header>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    
    <div id="noResults" class="hidden text-center py-20">
        <p class="text-2xl text-slate-500 font-semibold">we don't got that yet</p>
        <p class="text-slate-600 mt-2">search something else pls</p>
    </div>
<script>
    const CITIES = [
        { name: "Iran", lat: 35.68, lon: 51.38, zone: "Asia/Tehran" },
        { name: "Palestine", lat: 31.94, lon: 35.20, zone: "Asia/Gaza" },
        { name: "Philippines", lat: 14.59, lon: 120.98, zone: "Asia/Manila" },
        { name: "Singapore", lat: 1.35, lon: 103.81, zone: "Asia/Singapore" },
        { name: "New York", lat: 40.71, lon: -74.01, zone: "America/New_York" },
        { name: "London", lat: 51.50, lon: -0.12, zone: "Europe/London" },
        { name: "Tokyo", lat: 35.68, lon: 139.76, zone: "Asia/Tokyo" },
        { name: "California", lat: 34.05, lon: -118.24, zone: "America/Los_Angeles" },
        { name: "Moscow", lat: 55.75, lon: 37.61, zone: "Europe/Moscow" },
        { name: "Dubai", lat: 25.20, lon: 55.27, zone: "Asia/Dubai" },
        { name: "Hong Kong", lat: 22.31, lon: 114.16, zone: "Asia/Hong_Kong" },
        { name: "Toronto", lat: 43.65, lon: -79.38, zone: "America/Toronto" },
        { name: "Antarctica", lat: -77.84, lon: 166.66, zone: "Antarctica/McMurdo" },
        { name: "France", lat: 48.85, lon: 2.35, zone: "Europe/Paris" },
        { name: "Australia", lat: -33.86, lon: 151.20, zone: "Australia/Sydney" },
        { name: "Brazil", lat: -23.55, lon: -46.63, zone: "America/Sao_Paulo" },
        { name: "Egypt", lat: 30.04, lon: 31.23, zone: "Africa/Cairo" },
        { name: "Iceland", lat: 64.14, lon: -21.89, zone: "Atlantic/Reykjavik" },
        { name: "South Korea", lat: 37.56, lon: 126.97, zone: "Asia/Seoul" },
        { name: "South Africa", lat: -33.92, lon: 18.42, zone: "Africa/Johannesburg" },
        { name: "Thailand", lat: 13.75, lon: 100.50, zone: "Asia/Bangkok" },
        { name: "Germany", lat: 52.52, lon: 13.40, zone: "Europe/Berlin" },
        { name: "Mexico", lat: 19.43, lon: -99.13, zone: "America/Mexico_City" }
    ];
    const msg_list = ["ay what's the time", "¿qué hora es?", "quelle heure est-il?", "che ora è?", "what time is it?", "anong oras na?", "saat kaç?"];
    function updateHeader() {
        let el = document.querySelector('h1');
        el.innerText = msg_list[Math.floor(Math.random() * msg_list.length)];
    }
    const interpret_weather = (c) => {
        if (c == 0) return "Clear Sky";
        if (c >= 1 && c <= 3) return "Partly Cloudy";
        if (c >= 45 && c <= 48) return "Foggy";
        if (c >= 51 && c <= 55) return "Drizzle";
        if (c >= 61 && c <= 65) return "Rainy";
        if (c >= 71 && c <= 77) return "Snowy";
        if (c >= 80 && c <= 82) return "Rain Showers";
        if (c >= 95) return "Stormy";
        return "Unknown";
    }
    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&temperature_unit=fahrenheit`);
            const raw = await res.json();
            return raw.current || null;
        } catch (err) { 
            console.log("weather broke lol", err);
            return null; 
        }
    }
    document.getElementById('citySearch').oninput = function(e) {
        let val = e.target.value.toLowerCase();
        let all_cards = document.querySelectorAll('.city-card');
        let found = 0;
        all_cards.forEach(c => {
            let name = c.getAttribute('data-name');
            if (name.includes(val)) {
                c.style.display = "block";
                found++;
            } else {
                c.style.display = "none";
            }
        });
        let no_res = document.getElementById('noResults');
        if (found === 0) no_res.classList.remove('hidden');
        else no_res.classList.add('hidden');
    };
    function buildDashboard() {
        const board = document.getElementById('dashboard');
        board.innerHTML = ''; 
        CITIES.forEach(item => {
            const card_div = document.createElement('div');
            const safe_id = item.name.replace(/\s+/g, '-').toLowerCase();
            card_div.className = "city-card bg-slate-800/50 backdrop-blur-md rounded-xl p-6 shadow-lg border border-slate-700 transition-all duration-300 transform hover:scale-105 hover:border-blue-500 cursor-default";
            card_div.setAttribute('data-name', item.name.toLowerCase());
            card_div.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-2xl font-semibold">${item.name}</h2>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">${item.zone}</p>
                        <p id="cond-${safe_id}" class="text-blue-300 text-sm italic mt-1">Loading weather...</p>
                    </div>
                    <div class="text-right">
                        <p id="time-${safe_id}" class="text-3xl font-mono text-blue-400 font-bold">--:--:--</p>
                    </div>
                </div>
                <div class="mt-6 flex items-center justify-between">
                    <div class="flex flex-col">
                        <span id="temp-${safe_id}" class="text-4xl font-bold">...</span>
                        <span class="text-slate-400 text-xs uppercase">Temp</span>
                    </div>
                    <div class="flex flex-col text-right border-l border-slate-700 pl-4">
                        <span id="hum-${safe_id}" class="text-2xl font-bold text-blue-300">...</span>
                        <span class="text-slate-400 text-xs uppercase">Humidity</span>
                    </div>
                </div>
            `;
            board.appendChild(card_div);
            get_and_set_weather(item, safe_id);
        });
        updateClocks();
    }
    const get_and_set_weather = async (city_obj, id) => {
        let weather = await fetchWeather(city_obj.lat, city_obj.lon);
        let t_el = document.getElementById(`temp-${id}`);
        let h_el = document.getElementById(`hum-${id}`);
        let c_el = document.getElementById(`cond-${id}`);
        if (weather) {
            if (t_el) t_el.innerText = Math.round(weather.temperature_2m) + "°F";
            if (h_el) h_el.innerText = weather.relative_humidity_2m + "%";
            if (c_el) c_el.innerText = interpret_weather(weather.weather_code);
        } else {
            if (c_el) c_el.innerText = "N/A";
        }
    }
    const updateClocks = () => {
        CITIES.forEach(c => {
            const sid = c.name.replace(/\s+/g, '-').toLowerCase();
            const target = document.getElementById('time-' + sid);
            if (target) {
                try {
                    target.innerText = new Intl.DateTimeFormat('en-US', {
                        timeZone: c.zone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                    }).format(new Date());
                } catch (err) { target.innerText = "??:??"; }
            }
        });
    }
    updateHeader(); 
    buildDashboard();
    setInterval(updateClocks, 1000);
    setInterval(() => {
        console.log("refreshing dash...");
        buildDashboard();
    }, 1800000);
</script>
    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-50">
        <a href="https://github.com/MochiBoy9" target="_blank" class="bg-slate-800 p-3 rounded-full border border-slate-700 hover:border-blue-500 hover:scale-110 transition-all shadow-lg group">
            <svg class="w-6 h-6 fill-white group-hover:fill-blue-400" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.412-4.041-1.412-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path></svg>
        </a>
    </div>
</body>
</html>
